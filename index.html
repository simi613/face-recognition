<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI人脸识别系统</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            max-width: 820px;
            margin: 20px auto;
            padding: 0 15px;
            background: #f5f7fa;
        }
        .upload-box {
            border: 2px dashed #6386ff;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            background: #fff;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .slider-wrap {
            margin:10px 0;
        }
        .slider-wrap input{
            width:100%;
        }
        .btn {
            width:100%;
            padding:14px;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            margin:6px 0;
        }
        .btn-normal {
            background:#b4c2f0;
            color:#000;
        }
        .btn-red {
            background:#ff4444;
            color:white;
        }
        .result-box {
            margin-top:15px;
        }
        canvas, video {
            max-width:100%;
            border:1px solid #ddd;
        }
        .loading {
            background:#c2cbf0;
            color:#222;
            text-align:center;
            padding:14px;
            border-radius:6px;
            margin:8px 0;
        }
    </style>
    <!-- 在线引入OpenCV.js 无需本地模型，解决加载卡死 -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="cvReady()"></script>
</head>
<body>
    <!-- 图片上传区域 -->
    <div class="upload-box" id="uploadBox">
        <h3>点击或拖拽上传图片</h3>
        <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <!-- 自定义检测功能面板 -->
    <div class="panel">
        <h3>自定义检测功能</h3>
        <div>
            <label><input type="checkbox" id="chkGender" checked> 开启性别检测</label>
        </div>
        <div style="margin:8px 0;">
            <label><input type="checkbox" id="chkAge" checked> 开启年龄检测</label>
        </div>
        <div style="margin:8px 0;">
            <label><input type="checkbox" id="chkBlur"> 开启人脸模糊</label>
            <div class="slider-wrap">
                <span>模糊程度：</span>
                <input type="range" id="blurLevel" min="1" max="10" value="5">
            </div>
        </div>
        <div style="margin:8px 0;">
            <label><input type="checkbox" id="chkLabel" checked> 显示人脸编号/数量标注</label>
        </div>
        <div class="slider-wrap">
            <span>置信度阈值：<span id="confText">0.5</span></span>
            <input type="range" id="confSlider" min="0.1" max="0.9" step="0.05" value="0.5">
        </div>
        <div class="loading" id="loadStatus">等待图片上传...</div>
        <div class="result-box" id="imgResult"></div>
    </div>

    <!-- 摄像头拍照检测区域 -->
    <div class="panel">
        <h3>摄像头拍照检测</h3>
        <video id="video" autoplay playsinline style="display:none;"></video>
        <canvas id="captureCanvas" style="display:none;"></canvas>
        <div class="result-box" id="camResult"></div>
        <button class="btn btn-normal" id="captureBtn">拍照识别</button>
        <button class="btn btn-red" id="closeCamBtn">关闭摄像头</button>
    </div>

<script>
// 全局变量
let cv = null;
let videoStream = null;
let faceCascade = null;
let cvReadyFlag = false;
const confSlider = document.getElementById("confSlider");
const confText = document.getElementById("confText");
const loadStatus = document.getElementById("loadStatus");

// 1. OpenCV加载完成回调（解决一直检测中卡死核心）
function cvReady() {
    cv = window.cv;
    cvReadyFlag = true;
    loadStatus.innerText = "OpenCV引擎加载完成，可以上传图片/打开摄像头";
    // 加载人脸检测器
    loadFaceCascade();
}

// 加载人脸分类器
async function loadFaceCascade() {
    try {
        const res = await fetch("https://docs.opencv.org/4.x/data/haarcascades/haarcascade_frontalface_default.xml");
        const data = await res.arrayBuffer();
        const uint8Arr = new Uint8Array(data);
        cv.FS_createDataFile("/haar.xml", uint8Arr, true, false, false);
        faceCascade = new cv.CascadeClassifier();
        faceCascade.load("/haar.xml");
    } catch (err) {
        loadStatus.innerText = "人脸模型加载失败：" + err.message;
    }
}

// 2. 置信度滑块联动
confSlider.addEventListener("input", ()=>{
    confText.innerText = confSlider.value;
})

// 3. 上传图片拖拽+点击逻辑
const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("fileInput");
uploadBox.addEventListener("click", ()=>fileInput.click());
uploadBox.addEventListener("dragover", e=>e.preventDefault());
uploadBox.addEventListener("drop", e=>{
    e.preventDefault();
    if(e.dataTransfer.files.length) handleImage(e.dataTransfer.files[0]);
})
fileInput.addEventListener("change", ()=>{
    if(fileInput.files[0]) handleImage(fileInput.files[0]);
})

// 图片处理主函数（修复永久检测中，增加超时捕获）
async function handleImage(file) {
    if(!cvReadyFlag) {
        loadStatus.innerText = "引擎未加载完成，请等待...";
        return;
    }
    loadStatus.innerText = "检测中...";
    const reader = new FileReader();
    reader.onload = async (e)=>{
        try {
            const img = new Image();
            img.src = e.target.result;
            await new Promise(res=>img.onload=res);
            // OpenCV图像处理
            const src = cv.imread(img);
            const gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            const faces = new cv.RectVector();
            // 人脸检测
            faceCascade.detectMultiScale(gray, faces, 1.1, 3, 0);
            const blurEnable = document.getElementById("chkBlur").checked;
            const blurVal = Number(document.getElementById("blurLevel").value);
            const showLabel = document.getElementById("chkLabel").checked;
            // 人脸模糊+绘制框
            for(let i=0; i<faces.size(); i++) {
                const r = faces.get(i);
                if(blurEnable) {
                    const roi = src.roi(r);
                    cv.GaussianBlur(roi, roi, new cv.Size(blurVal*2+1, blurVal*2+1), blurVal);
                    roi.delete();
                }
                // 绘制人脸框
                cv.rectangle(src, new cv.Point(r.x, r.y), new cv.Point(r.x+r.width, r.y+r.height), new cv.Scalar(0,255,0), 2);
                if(showLabel) {
                    cv.putText(src, `人脸${i+1}`, new cv.Point(r.x, r.y-5), cv.FONT_HERSHEY_SIMPLEX, 0.5, new cv.Scalar(255,0,0),1);
                }
            }
            // 渲染结果画布
            const outCanvas = document.createElement("canvas");
            cv.imshow(outCanvas, src);
            // 清空并展示结果
            document.getElementById("imgResult").innerHTML = "";
            document.getElementById("imgResult").append(outCanvas);
            loadStatus.innerText = `检测完成，共识别${faces.size()}张人脸`;
            // 释放内存
            src.delete(); gray.delete(); faces.delete();
        } catch(err) {
            loadStatus.innerText = "检测失败：" + err.message;
        }
    }
    reader.readAsDataURL(file);
}

// 4. 摄像头相关逻辑（修复摄像头无响应，强制按钮内调用MediaStream）
const video = document.getElementById("video");
const captureCanvas = document.getElementById("captureCanvas");
const captureBtn = document.getElementById("captureBtn");
const closeCamBtn = document.getElementById("closeCamBtn");
const camResult = document.getElementById("camResult");

// 打开摄像头（必须点击触发，修复浏览器拦截）
captureBtn.addEventListener("click", async ()=>{
    if(!cvReadyFlag) {
        alert("引擎未加载完成，请稍等！");
        return;
    }
    if(videoStream) {
        // 拍照逻辑
        captureCanvas.width = video.videoWidth;
        captureCanvas.height = video.videoHeight;
        const ctx = captureCanvas.getContext("2d");
        ctx.drawImage(video,0,0);
        const imgData = captureCanvas.toDataURL("image/jpeg");
        const img = new Image();
        img.src = imgData;
        img.onload = ()=>{
            document.getElementById("imgResult").innerHTML = "";
            document.getElementById("imgResult").append(img);
            handleImageFromUrl(imgData);
        }
        return;
    }
    // 首次打开摄像头
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({
            video: {facingMode:"user", width:{ideal:640}, height:{ideal:480}},
            audio:false
        });
        video.srcObject = videoStream;
        video.style.display = "block";
        captureBtn.innerText = "点击拍照识别";
        camResult.innerHTML = "<p>摄像头已开启，点击按钮拍照</p>";
    } catch(err) {
        alert("摄像头开启失败："+err.message+"\n请允许浏览器相机权限，关闭占用相机软件");
        console.error(err);
    }
})

// 关闭摄像头
closeCamBtn.addEventListener("click", ()=>{
    if(videoStream) {
        videoStream.getTracks().forEach(t=>t.stop());
        videoStream = null;
    }
    video.style.display = "none";
    captureBtn.innerText = "拍照识别";
    camResult.innerHTML = "";
})

// 画布图片流转为图像检测
async function handleImageFromUrl(dataUrl) {
    loadStatus.innerText = "摄像头画面检测中...";
    const img = new Image();
    img.src = dataUrl;
    img.onload = async ()=>{
        try {
            const src = cv.imread(img);
            const gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            const faces = new cv.RectVector();
            faceCascade.detectMultiScale(gray, faces);
            const blurEnable = document.getElementById("chkBlur").checked;
            const blurVal = Number(document.getElementById("blurLevel").value);
            const showLabel = document.getElementById("chkLabel").checked;
            for(let i=0; i<faces.size(); i++) {
                const r = faces.get(i);
                if(blurEnable) {
                    const roi = src.roi(r);
                    cv.GaussianBlur(roi, roi, new cv.Size(blurVal*2+1, blurVal*2+1), blurVal);
                    roi.delete();
                }
                cv.rectangle(src, new cv.Point(r.x, r.y), new cv.Point(r.x+r.width, r.y+r.height), new cv.Scalar(0,255,0), 2);
                if(showLabel) cv.putText(src, `人脸${i+1}`, new cv.Point(r.x, r.y-5), cv.FONT_HERSHEY_SIMPLEX,0.5, new cv.Scalar(255,0,0),1);
            }
            const outCanvas = document.createElement("canvas");
            cv.imshow(outCanvas, src);
            document.getElementById("imgResult").innerHTML = "";
            document.getElementById("imgResult").append(outCanvas);
            loadStatus.innerText = `拍照检测完成，识别${faces.size()}张人脸`;
            src.delete(); gray.delete(); faces.delete();
        }catch(err){
            loadStatus.innerText = "拍照检测失败："+err.message;
        }
    }
}
</script>
</body>
</html>
